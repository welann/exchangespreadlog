# Generated by scripts/generate_config_from_lighter.py
# Lighter ranking key: daily_quote_token_volume.
mode = "bbo"

[pipeline]
channel_capacity = 4096
stale_after_ms = 5000

[storage]
mode = "clickhouse"
jsonl_dir = "data/bbo"

[storage.clickhouse]
url = "https://manyexchanges.zeabur.app/"
database = "zeabur"
table = "bbo_ticks"
catalog_table = "instrument_catalog"
username = "zeabur"
password_env = "CLICKHOUSE_PASSWORD"
accept_invalid_certs = true
create_table = true
batch_size = 100

[tui]
enabled = true
refresh_ms = 250

[[quote_rates]]
from = "USDC"
to = "USD"
rate = "1"

[[quote_rates]]
from = "USDT"
to = "USD"
rate = "1"

[[quote_rates]]
from = "AUSD"
to = "USD"
