mode = "bbo"

[pipeline]
channel_capacity = 4096
stale_after_ms = 5000

[storage]
mode = "jsonl"
jsonl_dir = "data/bbo"

[storage.clickhouse]
url = "https://obdata.zeabur.app/"
database = "zeabur"
table = "bbo_ticks"
username = "zeabur"
password_env = "CLICKHOUSE_PASSWORD"
create_table = true
batch_size = 100

[tui]
enabled = true
refresh_ms = 250

[[venues]]
name = "hyperliquid"
enabled = true
url = "wss://api.hyperliquid.xyz/ws"
markets = [
    "BTC",
    "ETH",
    "SOL",
]
channel = "bbo"

[[venues]]
name = "lighter"
enabled = true
url = "wss://mainnet.zklighter.elliot.ai/stream"
markets = [
    "0",
    "1",
    "2",
]
channel = "ticker"

[[venues]]
name = "risex"
enabled = true
url = "wss://ws.rise.trade/ws"
markets = [
    "1:BTC",
    "2:ETH",
    "4:SOL",
]
channel = "orderbook"

[[venues]]
name = "01"
enabled = true
url = "wss://zo-mainnet.n1.xyz"
markets = [
    "0:BTC:BTCUSD",
    "1:ETH:ETHUSD",
    "2:SOL:SOLUSD",
]
channel = "deltas"
