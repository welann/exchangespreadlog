mode = "bbo"

[pipeline]
channel_capacity = 4096
stale_after_ms = 5000

[storage]
mode = "jsonl"
jsonl_dir = "data/bbo"

[storage.clickhouse]
url = "https://obdata.zeabur.app/"
database = "zeabur"
table = "bbo_ticks"
catalog_table = "instrument_catalog"
username = "zeabur"
password_env = "CLICKHOUSE_PASSWORD"
create_table = true
batch_size = 100

[tui]
enabled = true
refresh_ms = 250

[[quote_rates]]
from = "USDC"
to = "USD"
rate = "1"

[[quote_rates]]
from = "USDT"
to = "USD"
rate = "1"

[[quote_rates]]
from = "AUSD"
to = "USD"
rate = "1"

[[venues]]
venue_instance_id = "hyperliquid"
adapter = "hyperliquid"
enabled = true
url = "wss://api.hyperliquid.xyz/ws"
channel = "bbo"
catalog_source = "exchange"
metadata_url = "https://api.hyperliquid.xyz/info"
default_quote_asset = "USDC"
default_settle_asset = "USDC"
default_margin_asset = "USDC"

